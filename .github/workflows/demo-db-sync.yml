name: Sync demo DB migrations

# When a migration is added on main, apply it to the DEMO Supabase
# (cjlcywifsrwcecajammi) automatically. The demo CODE already auto-deploys from
# this repo via Vercel; this closes the gap for its separate database so the
# demo stays in sync without a manual step. See scripts/sync-demo-migrations.mjs.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {} # allow a manual run from the Actions tab

concurrency:
  group: demo-db-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to diff added files
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Apply new migrations to the demo database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DEMO_PROJECT_REF: cjlcywifsrwcecajammi
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: node scripts/sync-demo-migrations.mjs
