# Portfolio Standard gate — generated by @caistech/portfolio-migrator
#
# Runs typecheck + lint + build, then route + auth smoke tests against the
# preview deploy URL. Fails the action (and blocks Vercel promotion) on any
# non-zero exit.
#
# Closes Portfolio Standard:
#   R1  — Auth four-leg pattern (auth smoke step)
#   R10 — No verbatim Postgres errors (errorResponse helper, enforced at code level)
#   R13 — Route smoke test on every deploy (route smoke step)

name: portfolio-gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PORTFOLIO_GATE_PREVIEW_URL: ${{ vars.PORTFOLIO_GATE_PREVIEW_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect package manager so the cache step + install step use the
      # right tooling. Pnpm workspaces (TourLingo, NDISSDA, F2K trio) need
      # pnpm/action-setup before setup-node can use the `cache: pnpm` key.
      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.detect-pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: ${{ steps.detect-pm.outputs.pm }}

      # Write the @caistech registry auth into ~/.npmrc BEFORE install.
      # The repo-local .npmrc uses `${GITHUB_PACKAGES_TOKEN}` syntax which is
      # supposed to be expanded by npm/pnpm — but the expansion has been
      # unreliable in CI (npm sends the literal placeholder string, GitHub
      # rejects it as "unauthenticated"). Writing the literal token via bash
      # `>>` is the robust path: bash always expands env vars.
      - name: Configure @caistech registry auth
        run: |
          mkdir -p ~
          {
            echo "@caistech:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${GITHUB_PACKAGES_TOKEN}"
          } >> ~/.npmrc
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.CAISTECH_PACKAGES_TOKEN }}

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.CAISTECH_PACKAGES_TOKEN }}

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

      - name: Verify preview URL is set
        run: |
          if [ -z "$PORTFOLIO_GATE_PREVIEW_URL" ]; then
            echo "::error::PORTFOLIO_GATE_PREVIEW_URL is not set. Wire it via repo vars or a preview-deploy step."
            exit 1
          fi
          echo "Preview URL: $PORTFOLIO_GATE_PREVIEW_URL"

      # TEMPORARY (2026-05-19 — portfolio migration in progress):
      # static audits emit warnings but DO NOT block the gate. Revert to
      # blocking by removing the `|| ...` wrapper once the R3 explanatory-header
      # + R14 sample-artefact backfill is done across the portfolio.
      - name: Static audits (R3 / R9 / R11 / R14 / R15 — warning-only)
        run: |
          npx --no-install portfolio-gate-audit-all \
            --base-url "$PORTFOLIO_GATE_PREVIEW_URL" \
            || echo "::warning::Portfolio Standard audits found violations — see step output. Migration in progress; not blocking deploy. Revert this step to blocking once R3 + R14 backfill is complete."

      - name: Route smoke test (Portfolio Standard R13)
        run: |
          npx --no-install portfolio-gate-smoke-routes \
            --config routes.config.json \
            --base-url "$PORTFOLIO_GATE_PREVIEW_URL"

      - name: Auth smoke test (Portfolio Standard R1/R4)
        run: |
          npx --no-install portfolio-gate-smoke-auth \
            --config auth.config.json \
            --base-url "$PORTFOLIO_GATE_PREVIEW_URL"
